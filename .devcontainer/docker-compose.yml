services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    depends_on:
      - database
    networks:
      - webident-network
    shm_size: "16gb"
    runtime: nvidia
    deploy:
      resources:
        limits:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  database:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    networks:
      - webident-network

volumes:
  neo4j_data:

networks:
  webident-network:
